<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>talk — peer to peer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1419;
    --panel:#161D26;
    --panel-2:#1C2530;
    --border:#232D3A;
    --amber:#E8A33D;
    --blue:#5B8DEF;
    --teal:#3DD6B0;
    --text:#E7ECF2;
    --muted:#7A8699;
    --danger:#E85D75;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- header / mesh ---- */
  header{
    border-bottom:1px solid var(--border);
    background:var(--panel);
    padding:14px 20px;
  }
  .header-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    letter-spacing:0.02em;
    color:var(--muted);
  }
  .brand b{color:var(--text);font-weight:600;}
  .room-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .room-code{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--amber);
    background:rgba(232,163,61,0.08);
    border:1px solid rgba(232,163,61,0.25);
    padding:5px 10px;
    border-radius:6px;
    max-width:220px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  button{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:500;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text);
    padding:6px 12px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  button:hover{border-color:var(--amber);}
  button:active{transform:translateY(1px);}
  button.primary{
    background:var(--blue);
    border-color:var(--blue);
    color:#0F1419;
    font-weight:600;
  }
  button.primary:hover{filter:brightness(1.08);}

  /* ---- mesh visualization ---- */
  .mesh-wrap{
    margin-top:12px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  #mesh{
    flex:0 0 auto;
    overflow:visible;
  }
  .mesh-status{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
  }
  .mesh-status .n{color:var(--teal);font-weight:600;}
  .link{
    stroke:var(--border);
    stroke-width:1.4;
    transition:stroke .3s ease, stroke-width .3s ease;
  }
  .link.pulse{
    stroke:var(--teal);
    stroke-width:2.2;
  }
  .node-you circle{fill:var(--blue);}
  .node-peer circle{fill:var(--teal);}
  .node text{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    fill:var(--muted);
  }

  /* ---- chat ---- */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:720px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
    min-height:0;
  }
  #log{
    flex:1;
    overflow-y:auto;
    padding:20px 0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width:78%;
    padding:9px 13px;
    border-radius:10px;
    font-size:14.5px;
    line-height:1.4;
    word-wrap:break-word;
  }
  .msg .meta{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    margin-bottom:3px;
    display:block;
  }
  .msg.me{
    align-self:flex-end;
    background:rgba(91,141,239,0.15);
    border:1px solid rgba(91,141,239,0.3);
    border-bottom-right-radius:3px;
  }
  .msg.peer{
    align-self:flex-start;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-bottom-left-radius:3px;
  }
  .msg.system{
    align-self:center;
    background:none;
    border:none;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    padding:2px;
  }

  form#composer{
    display:flex;
    gap:8px;
    padding:14px 0 20px;
    border-top:1px solid var(--border);
  }
  #input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    padding:10px 14px;
    outline:none;
  }
  #input:focus{border-color:var(--amber);}

  .note{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    padding-bottom:14px;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand"><b>talk</b> — no server, no history, just this room</div>
    <div class="room-controls">
      <span class="room-code mono" id="roomLabel">connecting…</span>
      <button id="copyBtn">copy link</button>
      <button id="newBtn">new room</button>
    </div>
  </div>
  <div class="mesh-wrap">
    <svg id="mesh" width="120" height="70" viewBox="0 0 120 70"></svg>
    <div class="mesh-status mono">
      <span class="n" id="peerCount">0</span> peer(s) connected
    </div>
  </div>
</header>

<main>
  <div id="log"></div>
  <form id="composer">
    <input id="input" class="mono" autocomplete="off" placeholder="message…" maxlength="2000">
    <button type="submit" class="primary">send</button>
  </form>
</main>
<div class="note">messages exist only in these open tabs — closing everyone's tab deletes the conversation</div>

<script type="module">
  import { joinRoom } from 'https://esm.sh/@trystero-p2p/torrent';

  // ---------- room resolution ----------
  function randomSlug(len = 24) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let s = '';
    const bytes = crypto.getRandomValues(new Uint8Array(len));
    for (let i = 0; i < len; i++) s += chars[bytes[i] % chars.length];
    return s;
  }

  let room = new URLSearchParams(location.search).get('r');

  if (!room) {
    // direct hit on /talk/ or /talk/index.html with no slug handed off
    const parts = location.pathname.split('/').filter(Boolean);
    room = parts[1] || '';
  }
  if (!room) {
    room = randomSlug();
  }
  // clean the address bar to /talk/<room> either way
  history.replaceState({}, '', '/talk/' + room);
  console.log('[talk] resolved room:', room);

  document.getElementById('roomLabel').textContent = room;

  // ---------- WebRTC mesh via public discovery (no backend) ----------
  const APP_ID = 'cylian-nl-talk-v1';
  const trystero = joinRoom({ appId: APP_ID }, room);
  const [sendMsg, onMsg] = trystero.makeAction('msg');

  const peers = new Map(); // peerId -> short label

  // ---------- UI refs ----------
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const form = document.getElementById('composer');
  const peerCountEl = document.getElementById('peerCount');
  const mesh = document.getElementById('mesh');

  function shortId(id) { return id.slice(0, 5); }

  function addMsg(kind, text, who) {
    const el = document.createElement('div');
    el.className = 'msg ' + kind;
    if (kind === 'system') {
      el.textContent = text;
    } else {
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = (kind === 'me' ? 'you' : who) + ' · ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      el.appendChild(meta);
      const body = document.createElement('div');
      body.textContent = text;
      el.appendChild(body);
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  // ---------- mesh visualization ----------
  function renderMesh() {
    const w = 120, h = 70, cx = 20, cy = 35;
    let svg = `<g class="node-you"><circle cx="${cx}" cy="${cy}" r="7"/><text x="${cx}" y="${cy+18}" text-anchor="middle">you</text></g>`;
    const ids = [...peers.keys()];
    const n = ids.length;
    ids.forEach((id, i) => {
      const angle = n === 1 ? 0 : (i / Math.max(n - 1, 1)) * Math.PI - Math.PI / 2;
      const px = 95;
      const py = n === 1 ? cy : 12 + (i / Math.max(n - 1, 1)) * 46;
      svg = `<line class="link" data-peer="${id}" x1="${cx}" y1="${cy}" x2="${px}" y2="${py}"/>` + svg;
      svg += `<g class="node-peer"><circle cx="${px}" cy="${py}" r="5.5"/><text x="${px}" y="${py < cy ? py-10 : py+16}" text-anchor="middle">${shortId(id)}</text></g>`;
    });
    mesh.setAttribute('viewBox', `0 0 ${w} ${h}`);
    mesh.innerHTML = svg;
  }

  function pulseLink(peerId) {
    const line = mesh.querySelector(`line[data-peer="${peerId}"]`);
    if (!line) return;
    line.classList.add('pulse');
    setTimeout(() => line.classList.remove('pulse'), 350);
  }

  renderMesh();

  // ---------- peer lifecycle ----------
  trystero.onPeerJoin(peerId => {
    peers.set(peerId, shortId(peerId));
    peerCountEl.textContent = peers.size;
    renderMesh();
    addMsg('system', `peer ${shortId(peerId)} joined`);
  });

  trystero.onPeerLeave(peerId => {
    peers.delete(peerId);
    peerCountEl.textContent = peers.size;
    renderMesh();
    addMsg('system', `peer ${shortId(peerId)} left`);
  });

  onMsg((data, peerId) => {
    addMsg('peer', data, shortId(peerId));
    pulseLink(peerId);
  });

  // ---------- composer ----------
  form.addEventListener('submit', e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    sendMsg(text);
    addMsg('me', text);
    peers.forEach((_, id) => pulseLink(id));
    input.value = '';
  });

  // ---------- header actions ----------
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(location.href);
    const btn = document.getElementById('copyBtn');
    const original = btn.textContent;
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = original, 1200);
  });

  document.getElementById('newBtn').addEventListener('click', () => {
    location.href = '/talk/' + randomSlug();
  });

  addMsg('system', `room "${room}" — waiting for peers to connect…`);
</script>
</body>
</html>
