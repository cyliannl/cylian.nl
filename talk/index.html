<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>talk — peer to peer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1419;
    --panel:#161D26;
    --panel-2:#1C2530;
    --border:#232D3A;
    --amber:#E8A33D;
    --blue:#5B8DEF;
    --teal:#3DD6B0;
    --text:#E7ECF2;
    --muted:#7A8699;
    --danger:#E85D75;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- header / mesh ---- */
  header{
    border-bottom:1px solid var(--border);
    background:var(--panel);
    padding:14px 20px;
  }
  .header-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    letter-spacing:0.02em;
    color:var(--muted);
  }
  .brand b{color:var(--text);font-weight:600;}
  .room-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .room-code{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--amber);
    background:rgba(232,163,61,0.08);
    border:1px solid rgba(232,163,61,0.25);
    padding:5px 10px;
    border-radius:6px;
    max-width:220px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  button{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:500;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text);
    padding:6px 12px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  button:hover{border-color:var(--amber);}
  button:active{transform:translateY(1px);}
  button.primary{
    background:var(--blue);
    border-color:var(--blue);
    color:#0F1419;
    font-weight:600;
  }
  button.primary:hover{filter:brightness(1.08);}

  /* ---- mesh visualization ---- */
  .mesh-wrap{
    margin-top:12px;
    display:flex;
    align-items:center;
    gap:14px;
  }
  #mesh{
    flex:0 0 auto;
    overflow:visible;
  }
  .mesh-status{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
  }
  .mesh-status .n{color:var(--teal);font-weight:600;}
  .link{
    stroke:var(--border);
    stroke-width:1.4;
    transition:stroke .3s ease, stroke-width .3s ease;
  }
  .link.pulse{
    stroke:var(--teal);
    stroke-width:2.2;
  }
  .node-you circle{fill:var(--blue);}
  .node-peer circle{fill:var(--teal);}
  .node text{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    fill:var(--muted);
  }

  /* ---- chat ---- */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:720px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
    min-height:0;
  }
  #log{
    flex:1;
    overflow-y:auto;
    padding:20px 0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width:78%;
    padding:9px 13px;
    border-radius:10px;
    font-size:14.5px;
    line-height:1.4;
    word-wrap:break-word;
  }
  .msg .meta{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    margin-bottom:3px;
    display:block;
  }
  .msg.me{
    align-self:flex-end;
    background:rgba(91,141,239,0.15);
    border:1px solid rgba(91,141,239,0.3);
    border-bottom-right-radius:3px;
  }
  .msg.peer{
    align-self:flex-start;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-bottom-left-radius:3px;
  }
  .msg.system{
    align-self:center;
    background:none;
    border:none;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    padding:2px;
  }

  form#composer{
    display:flex;
    gap:8px;
    padding:14px 0 20px;
    border-top:1px solid var(--border);
  }
  #input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    padding:10px 14px;
    outline:none;
  }
  #input:focus{border-color:var(--amber);}

  .note{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    padding-bottom:14px;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand"><b>talk</b> — no server, no history, end-to-end encrypted</div>
    <div class="room-controls">
      <span class="room-code mono" id="roomLabel">connecting…</span>
      <button id="copyBtn">copy link</button>
      <button id="newBtn">new room</button>
    </div>
  </div>
  <div class="mesh-wrap">
    <svg id="mesh" width="120" height="70" viewBox="0 0 120 70"></svg>
    <div class="mesh-status mono">
      <span class="n" id="peerCount">0</span> peer(s) connected
    </div>
  </div>
</header>

<main>
  <div id="log"></div>
  <form id="composer">
    <input id="input" class="mono" autocomplete="off" placeholder="message…" maxlength="2000">
    <button type="submit" class="primary">send</button>
  </form>
</main>
<div class="note">messages are encrypted before they leave your browser — a relay routes them, but can't read them — and nothing is ever stored</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
  // ---------- room resolution ----------
  function randomSlug(len = 24) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let s = '';
    const bytes = crypto.getRandomValues(new Uint8Array(len));
    for (let i = 0; i < len; i++) s += chars[bytes[i] % chars.length];
    return s;
  }

  let room = new URLSearchParams(location.search).get('r');

  if (!room) {
    // direct hit on /talk/ or /talk/index.html with no slug handed off
    const parts = location.pathname.split('/').filter(Boolean);
    room = parts[1] || '';
  }
  if (!room) {
    room = randomSlug();
  }
  // clean the address bar to /talk/<room> either way
  history.replaceState({}, '', '/talk/' + room);
  console.log('[talk] resolved room:', room);
  document.getElementById('roomLabel').textContent = room;

  // ---------- crypto: derive a topic + an AES-GCM key from the room slug ----------
  // The relay only ever sees the topic hash and ciphertext — never the slug, never plaintext.
  async function sha256Hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function deriveKey(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return crypto.subtle.importKey('raw', buf, 'AES-GCM', false, ['encrypt', 'decrypt']);
  }
  function b64(bytes) { return btoa(String.fromCharCode(...bytes)); }
  function unb64(str) { return Uint8Array.from(atob(str), c => c.charCodeAt(0)); }

  const APP_ID = 'cylian-nl-talk-v2';
  const topic = 'talk/' + await sha256Hex(APP_ID + '|topic|' + room);
  const cryptoKey = await deriveKey(APP_ID + '|key|' + room);

  async function encryptText(text) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, new TextEncoder().encode(text));
    return { iv: b64(iv), ct: b64(new Uint8Array(ct)) };
  }
  async function decryptPayload(ivB64, ctB64) {
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: unb64(ivB64) }, cryptoKey, unb64(ctB64));
    return new TextDecoder().decode(pt);
  }

  // ---------- UI refs ----------
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const form = document.getElementById('composer');
  const peerCountEl = document.getElementById('peerCount');
  const mesh = document.getElementById('mesh');

  function addMsg(kind, text, who) {
    const el = document.createElement('div');
    el.className = 'msg ' + kind;
    if (kind === 'system') {
      el.textContent = text;
    } else {
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = (kind === 'me' ? 'you' : who) + ' · ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      el.appendChild(meta);
      const body = document.createElement('div');
      body.textContent = text;
      el.appendChild(body);
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  // ---------- mesh visualization ----------
  const peers = new Map(); // clientId -> lastSeen timestamp

  function renderMesh() {
    const w = 120, h = 70, cx = 20, cy = 35;
    let svg = `<g class="node-you"><circle cx="${cx}" cy="${cy}" r="7"/><text x="${cx}" y="${cy+18}" text-anchor="middle">you</text></g>`;
    const ids = [...peers.keys()];
    const n = ids.length;
    ids.forEach((id, i) => {
      const px = 95;
      const py = n === 1 ? cy : 12 + (i / Math.max(n - 1, 1)) * 46;
      svg = `<line class="link" data-peer="${id}" x1="${cx}" y1="${cy}" x2="${px}" y2="${py}"/>` + svg;
      svg += `<g class="node-peer"><circle cx="${px}" cy="${py}" r="5.5"/><text x="${px}" y="${py < cy ? py-10 : py+16}" text-anchor="middle">${id}</text></g>`;
    });
    mesh.setAttribute('viewBox', `0 0 ${w} ${h}`);
    mesh.innerHTML = svg;
  }

  function pulseLink(peerId) {
    const line = mesh.querySelector(`line[data-peer="${peerId}"]`);
    if (!line) return;
    line.classList.add('pulse');
    setTimeout(() => line.classList.remove('pulse'), 350);
  }

  renderMesh();

  // ---------- connection status banner ----------
  function setStatus(text, kind) {
    let el = document.getElementById('statusNotice');
    if (!el) {
      el = document.createElement('div');
      el.id = 'statusNotice';
      el.style.cssText = 'padding:10px 16px;font-family:Inter,sans-serif;font-size:13px;line-height:1.5;max-width:720px;margin:12px auto 0;border-radius:8px;';
      document.querySelector('header').after(el);
    }
    const styles = {
      warn: 'background:rgba(232,163,61,0.12);border:1px solid rgba(232,163,61,0.35);color:var(--text);',
      ok:   'background:rgba(61,214,176,0.10);border:1px solid rgba(61,214,176,0.3);color:var(--text);'
    };
    el.style.cssText += styles[kind] || styles.warn;
    el.textContent = text;
    if (kind === 'ok') setTimeout(() => el.remove(), 2000);
  }

  // ---------- relay connection (WebSocket only — no WebRTC, nothing for Brave/extensions to block) ----------
  const clientId = randomSlug(6);
  setStatus('connecting to relay…', 'warn');

  const mq = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
    clientId: 'talk-' + clientId,
    clean: true,
    reconnectPeriod: 2000
  });

  function sendPresence(type) {
    mq.publish(topic, JSON.stringify({ type, from: clientId }));
  }

  mq.on('connect', () => {
    setStatus('connected', 'ok');
    mq.subscribe(topic);
    sendPresence('hello');
    setInterval(() => sendPresence('hello'), 5000);
    setInterval(prunePeers, 4000);
  });

  mq.on('reconnect', () => setStatus('reconnecting to relay…', 'warn'));
  mq.on('offline', () => setStatus('relay unreachable — retrying…', 'warn'));
  mq.on('error', err => setStatus('relay error: ' + (err?.message || err), 'warn'));

  mq.on('message', async (t, payload) => {
    if (t !== topic) return;
    let msg;
    try { msg = JSON.parse(payload.toString()); } catch { return; }
    if (!msg || msg.from === clientId) return;

    if (msg.type === 'hello') {
      const isNew = !peers.has(msg.from);
      peers.set(msg.from, Date.now());
      peerCountEl.textContent = peers.size;
      renderMesh();
      if (isNew) addMsg('system', `peer ${msg.from} joined`);
    } else if (msg.type === 'bye') {
      if (peers.has(msg.from)) {
        peers.delete(msg.from);
        peerCountEl.textContent = peers.size;
        renderMesh();
        addMsg('system', `peer ${msg.from} left`);
      }
    } else if (msg.type === 'msg') {
      peers.set(msg.from, Date.now());
      try {
        const text = await decryptPayload(msg.iv, msg.ct);
        addMsg('peer', text, msg.from);
        pulseLink(msg.from);
      } catch { /* not decryptable with our key — ignore */ }
    }
  });

  function prunePeers() {
    const now = Date.now();
    let changed = false;
    for (const [id, last] of peers) {
      if (now - last > 15000) {
        peers.delete(id);
        changed = true;
        addMsg('system', `peer ${id} timed out`);
      }
    }
    if (changed) { peerCountEl.textContent = peers.size; renderMesh(); }
  }

  window.addEventListener('beforeunload', () => sendPresence('bye'));

  // ---------- composer ----------
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    const enc = await encryptText(text);
    mq.publish(topic, JSON.stringify({ type: 'msg', from: clientId, iv: enc.iv, ct: enc.ct }));
    addMsg('me', text);
    peers.forEach((_, id) => pulseLink(id));
    input.value = '';
  });

  // ---------- header actions ----------
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(location.href);
    const btn = document.getElementById('copyBtn');
    const original = btn.textContent;
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = original, 1200);
  });

  document.getElementById('newBtn').addEventListener('click', () => {
    location.href = '/talk/' + randomSlug();
  });

  addMsg('system', `room "${room}" — waiting for peers to connect…`);
</script>
</body>
</html>
