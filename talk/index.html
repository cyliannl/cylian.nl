<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>talk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0B;
    --text:#E6E6E6;
    --muted:#63666D;
    --dim:#3A3C42;
    --accent:#E8A33D;
    --ok:#3DD6B0;
    --warn:#E8A33D;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13.5px;
    line-height:1.55;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  header{
    border-bottom:1px solid var(--dim);
    padding:14px 20px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .path{color:var(--muted);}
  .path b{color:var(--text);font-weight:600;}
  .room{color:var(--text);}
  .actions{display:flex;gap:14px;}
  .actions a{
    color:var(--muted);
    cursor:pointer;
    text-decoration:none;
    border-bottom:1px dotted var(--dim);
  }
  .actions a:hover{color:var(--accent);border-color:var(--accent);}
  .status{
    color:var(--muted);
    font-size:12px;
  }
  .status .dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--dim);
    margin-right:6px;
  }
  .status.live .dot{background:var(--ok);}
  .status.warn .dot{background:var(--warn);}

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:0 20px;
    min-height:0;
  }
  #log{
    flex:1;
    overflow-y:auto;
    padding:18px 0;
  }
  .line{
    padding:2px 0;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .line .t{color:var(--dim);}
  .line .who{font-weight:600;}
  .line.me .who{color:var(--accent);}
  .line.peer .who{color:var(--text);}
  .line.system{color:var(--muted);}
  .line a.file{
    color:var(--ok);
    text-decoration:none;
    border-bottom:1px dotted var(--ok);
  }
  .line a.file:hover{opacity:0.8;}

  form#composer{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 0 18px;
    border-top:1px solid var(--dim);
  }
  .prompt{color:var(--accent);}
  #input{
    flex:1;
    background:none;
    border:none;
    color:var(--text);
    font-family:inherit;
    font-size:13.5px;
    outline:none;
  }
  #input::placeholder{color:var(--dim);}
  #fileLabel{
    color:var(--muted);
    cursor:pointer;
    border-bottom:1px dotted var(--dim);
  }
  #fileLabel:hover{color:var(--accent);border-color:var(--accent);}
  #fileInput{display:none;}
  button{
    background:none;
    border:none;
    color:var(--muted);
    font-family:inherit;
    font-size:13.5px;
    cursor:pointer;
  }
  button:hover{color:var(--accent);}

  .note{
    text-align:center;
    color:var(--dim);
    font-size:11px;
    padding-bottom:14px;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--dim);border-radius:4px;}
</style>
</head>
<body>

<header>
  <span class="path">~/talk/<span class="room" id="roomLabel">…</span></span>
  <span class="actions">
    <a id="copyBtn">copy link</a>
    <a id="newBtn">new room</a>
  </span>
  <span class="status" id="statusEl"><span class="dot"></span><span id="statusText">connecting</span> · <span id="peerCount">0</span> peer(s)</span>
</header>

<main>
  <div id="log"></div>
  <form id="composer">
    <span class="prompt">&gt;</span>
    <input id="input" autocomplete="off" placeholder="message" maxlength="4000">
    <label id="fileLabel" for="fileInput">+file</label>
    <input type="file" id="fileInput">
    <button type="submit">send</button>
  </form>
</main>
<div class="note">encrypted before it leaves your browser · nothing is stored · files capped at 20MB</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script type="module">
  // ---------- room resolution ----------
  function randomSlug(len = 24) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let s = '';
    const bytes = crypto.getRandomValues(new Uint8Array(len));
    for (let i = 0; i < len; i++) s += chars[bytes[i] % chars.length];
    return s;
  }

  let room = new URLSearchParams(location.search).get('r');
  if (!room) {
    const parts = location.pathname.split('/').filter(Boolean);
    room = parts[1] || '';
  }
  if (!room) room = randomSlug();
  history.replaceState({}, '', '/talk/' + room);
  console.log('[talk] resolved room:', room);
  document.getElementById('roomLabel').textContent = room;

  // ---------- crypto: derive topic + AES-GCM key from the room slug ----------
  async function sha256Hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function deriveKey(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return crypto.subtle.importKey('raw', buf, 'AES-GCM', false, ['encrypt', 'decrypt']);
  }
  function b64(bytes) {
    let s = '';
    for (let i = 0; i < bytes.length; i += 0x8000) s += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
    return btoa(s);
  }
  function unb64(str) { return Uint8Array.from(atob(str), c => c.charCodeAt(0)); }

  const APP_ID = 'cylian-nl-talk-v2';
  const topic = 'talk/' + await sha256Hex(APP_ID + '|topic|' + room);
  const cryptoKey = await deriveKey(APP_ID + '|key|' + room);

  async function encryptBytes(bytes) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, bytes);
    return { iv: b64(iv), ct: b64(new Uint8Array(ct)) };
  }
  async function decryptToBytes(ivB64, ctB64) {
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: unb64(ivB64) }, cryptoKey, unb64(ctB64));
    return new Uint8Array(pt);
  }
  const enc = new TextEncoder(), dec = new TextDecoder();

  // ---------- UI refs ----------
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const form = document.getElementById('composer');
  const fileInput = document.getElementById('fileInput');
  const peerCountEl = document.getElementById('peerCount');
  const statusEl = document.getElementById('statusEl');
  const statusText = document.getElementById('statusText');

  function timeNow() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

  function addLine(kind, who, bodyEl) {
    const el = document.createElement('div');
    el.className = 'line ' + kind;
    if (kind === 'system') {
      el.textContent = bodyEl;
    } else {
      const t = document.createElement('span'); t.className = 't'; t.textContent = timeNow() + ' ';
      const w = document.createElement('span'); w.className = 'who'; w.textContent = (kind === 'me' ? 'you' : who) + ': ';
      el.appendChild(t); el.appendChild(w);
      if (typeof bodyEl === 'string') el.appendChild(document.createTextNode(bodyEl));
      else el.appendChild(bodyEl);
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function fmtSize(n) {
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function setStatus(text, kind) {
    statusText.textContent = text;
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  // ---------- presence ----------
  const peers = new Map(); // clientId -> lastSeen
  const clientId = randomSlug(6);

  function prunePeers() {
    const now = Date.now();
    let changed = false;
    for (const [id, last] of peers) {
      if (now - last > 15000) {
        peers.delete(id);
        changed = true;
        addLine('system', null, `— ${id} left —`);
      }
    }
    if (changed) peerCountEl.textContent = peers.size;
  }

  // ---------- relay connection ----------
  setStatus('connecting…', 'warn');
  const mq = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
    clientId: 'talk-' + clientId,
    clean: true,
    reconnectPeriod: 2000
  });

  function publish(payload, qos = 0) {
    mq.publish(topic, JSON.stringify(payload), { qos });
  }
  function sendPresence(type) { publish({ type, from: clientId }); }

  mq.on('connect', () => {
    setStatus('live', 'live');
    mq.subscribe(topic);
    sendPresence('hello');
    setInterval(() => sendPresence('hello'), 5000);
    setInterval(prunePeers, 4000);
  });
  mq.on('reconnect', () => setStatus('reconnecting…', 'warn'));
  mq.on('offline', () => setStatus('offline — retrying…', 'warn'));
  mq.on('error', err => setStatus('relay error', 'warn'));

  // ---------- incoming file reassembly ----------
  const incoming = new Map(); // fileId -> {name, mime, size, iv, chunks: [], total}

  mq.on('message', async (t, payload) => {
    if (t !== topic) return;
    let msg;
    try { msg = JSON.parse(payload.toString()); } catch { return; }
    if (!msg || msg.from === clientId) return;

    if (msg.type === 'hello') {
      const isNew = !peers.has(msg.from);
      peers.set(msg.from, Date.now());
      peerCountEl.textContent = peers.size;
      if (isNew) addLine('system', null, `— ${msg.from} joined —`);
      return;
    }
    if (msg.type === 'bye') {
      if (peers.has(msg.from)) {
        peers.delete(msg.from);
        peerCountEl.textContent = peers.size;
        addLine('system', null, `— ${msg.from} left —`);
      }
      return;
    }

    peers.set(msg.from, Date.now());

    if (msg.type === 'msg') {
      try {
        const text = dec.decode(await decryptToBytes(msg.iv, msg.ct));
        addLine('peer', msg.from, text);
      } catch { /* undecryptable, ignore */ }
      return;
    }

    if (msg.type === 'file-start') {
      incoming.set(msg.fileId, {
        name: msg.name, mime: msg.mime, size: msg.size, iv: msg.iv,
        total: msg.total, chunks: new Array(msg.total), from: msg.from,
        lineEl: addLine('peer', msg.from, `↓ receiving ${msg.name} (${fmtSize(msg.size)})…`)
      });
      return;
    }
    if (msg.type === 'file-chunk') {
      const f = incoming.get(msg.fileId);
      if (!f) return;
      f.chunks[msg.index] = msg.data;
      const got = f.chunks.filter(Boolean).length;
      f.lineEl.lastChild.textContent = `↓ receiving ${f.name} (${fmtSize(f.size)})… ${Math.round(got / f.total * 100)}%`;
      if (got === f.total) {
        try {
          const ctB64 = f.chunks.join('');
          const bytes = await decryptToBytes(f.iv, ctB64);
          const blob = new Blob([bytes], { type: f.mime || 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          f.lineEl.textContent = '';
          const t = document.createElement('span'); t.className = 't'; t.textContent = timeNow() + ' ';
          const w = document.createElement('span'); w.className = 'who'; w.textContent = f.from + ': ';
          const a = document.createElement('a');
          a.className = 'file'; a.href = url; a.download = f.name;
          a.textContent = `↓ ${f.name} (${fmtSize(f.size)}) — download`;
          f.lineEl.appendChild(t); f.lineEl.appendChild(w); f.lineEl.appendChild(a);
        } catch {
          f.lineEl.textContent = `↓ ${f.name} — failed to decrypt`;
        }
        incoming.delete(msg.fileId);
      }
    }
  });

  window.addEventListener('beforeunload', () => sendPresence('bye'));

  // ---------- send text ----------
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const text = input.value.trim();
    if (text) {
      const e2 = await encryptBytes(enc.encode(text));
      publish({ type: 'msg', from: clientId, iv: e2.iv, ct: e2.ct });
      addLine('me', null, text);
      input.value = '';
      return;
    }
    if (fileInput.files[0]) sendFile(fileInput.files[0]);
  });

  // ---------- send file (chunked) ----------
  const MAX_FILE_SIZE = 20 * 1024 * 1024;
  const CHUNK_B64_LEN = 64000; // ~48KB decoded per chunk, safely under broker's packet cap

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) sendFile(fileInput.files[0]);
  });

  async function sendFile(file) {
    fileInput.value = '';
    if (file.size > MAX_FILE_SIZE) {
      addLine('system', null, `— ${file.name} is too large (max ${fmtSize(MAX_FILE_SIZE)}) —`);
      return;
    }
    const fileId = randomSlug(10);
    const bytes = new Uint8Array(await file.arrayBuffer());
    const e2 = await encryptBytes(bytes);
    const total = Math.ceil(e2.ct.length / CHUNK_B64_LEN);

    const lineEl = addLine('me', null, `↑ sending ${file.name} (${fmtSize(file.size)})… 0%`);
    publish({ type: 'file-start', from: clientId, fileId, name: file.name, mime: file.type, size: file.size, iv: e2.iv, total }, 1);

    for (let i = 0; i < total; i++) {
      const chunk = e2.ct.slice(i * CHUNK_B64_LEN, (i + 1) * CHUNK_B64_LEN);
      publish({ type: 'file-chunk', from: clientId, fileId, index: i, data: chunk }, 1);
      lineEl.lastChild.textContent = `↑ sending ${file.name} (${fmtSize(file.size)})… ${Math.round((i + 1) / total * 100)}%`;
      await new Promise(r => setTimeout(r, 15)); // pace chunks so the broker doesn't drop a burst
    }

    const url = URL.createObjectURL(file);
    lineEl.textContent = '';
    const t = document.createElement('span'); t.className = 't'; t.textContent = timeNow() + ' ';
    const w = document.createElement('span'); w.className = 'who'; w.textContent = 'you: ';
    const a = document.createElement('a');
    a.className = 'file'; a.href = url; a.download = file.name;
    a.textContent = `↑ ${file.name} (${fmtSize(file.size)}) — sent`;
    lineEl.appendChild(t); lineEl.appendChild(w); lineEl.appendChild(a);
  }

  // ---------- header actions ----------
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(location.href);
    const el = document.getElementById('copyBtn');
    const original = el.textContent;
    el.textContent = 'copied';
    setTimeout(() => el.textContent = original, 1200);
  });
  document.getElementById('newBtn').addEventListener('click', () => {
    location.href = '/talk/' + randomSlug();
  });

  addLine('system', null, `— room ${room} — waiting for peers —`);
</script>
</body>
</html>
